name: Release to Maven Central

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs JDK, imports GPG key, and writes ~/.m2/settings.xml
      # with <server id="ossrh"> credentials that match your POM
      - name: Set up JDK + Maven settings + GPG
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      # Ensure the POM version equals the tag (vX.Y.Z -> X.Y.Z)
      - name: Sync POM version from tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          echo "Releasing version: $VERSION"
          mvn -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      # Optional sanity build without signing (avoid accidental GPG at verify)
      - name: Verify (no tests, no signing)
        run: mvn -B -DskipTests -Dgpg.skip=true verify

      # Real deploy: activates your 'release' profile
      # which runs maven-gpg-plugin + nexus-staging (auto close/release)
      - name: Deploy to OSSRH (staging -> release)
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -P release -DskipTests deploy

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
