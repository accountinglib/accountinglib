name: Release to Maven Central

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write  # needed for GitHub Release

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    env:
      MAVEN_CLI_OPTS: "-B -DskipTests"
      MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK + Maven settings + GPG
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: ossrh                     # must match <distributionManagement><...><id> in pom.xml
          server-username: OSSRH_USERNAME      # pulls from env/secrets below at runtime
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sync POM version from tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "Releasing version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "Tag must not end with -SNAPSHOT"; exit 1
          fi
          mvn $MAVEN_CLI_OPTS versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false
          mvn -q --non-recursive -Dexec.executable=echo -Dexec.args='${project.version}' exec:exec

      - name: Verify (no tests, no signing)
        run: mvn $MAVEN_CLI_OPTS -Dgpg.skip=true verify

      - name: Deploy to OSSRH (staging -> release)
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn $MAVEN_CLI_OPTS -P release deploy

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
